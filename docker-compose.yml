services:
  libreseerr:
    build: .
    container_name: libreseerr
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      - '/opt/appdata/libreseerr:/app/data'
    environment:
      # Leave SECRET_KEY blank to have the app auto-generate and persist one
      # to /app/data/secret_key on first run (see _load_or_create_secret_key).
      - SECRET_KEY=${SECRET_KEY:-}
    restart: unless-stopped